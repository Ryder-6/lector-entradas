<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lector de Entradas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="app-header">
        <div class="badges-row">
          <img
            src="./media/Puente Genil F.C.png"
            alt="Escudo del Puente Genil F.C."
            class="club-badge"
          />
          <img
            src="./media/Qanet.png"
            alt="Qanet"
            class="club-badge qanet-badge"
          />
        </div>
        <p class="kicker">Control de Acceso</p>

      </header>

      <section id="login-view" class="card view active" aria-label="Login">
        <h2>Login</h2>
        <form id="login-form" class="form-grid">
          <label>
            Usuario
            <input id="usuario" name="usuario" type="text" required autocomplete="username" />
          </label>

          <label>
            Contraseña
            <input
              id="contrasena"
              name="contrasena"
              type="password"
              required
              autocomplete="current-password"
            />
          </label>

          <label class="checkbox-row">
            <input id="mantenerSesion" name="mantenerSesion" type="checkbox" />
            Mantener sesión iniciada
          </label>

          <button type="submit" class="btn btn-primary">Iniciar sesión</button>
          <p id="login-status" class="status-text" aria-live="polite"></p>
        </form>
      </section>

      <section id="reader-view" class="card view" aria-label="Leer CCBB">

        <form id="reader-form" class="form-grid compact">
          <label>
            Introducir o escanear CCBB / QR
            <input
              id="ccbb"
              name="ccbb"
              type="text"
              placeholder="Ej: 1234567891234"
              inputmode="text"
              autocomplete="off"
              required
            />
          </label>

          <div class="actions-row">
            <button type="submit" class="btn btn-primary">Leer CCBB</button>
            <button id="btn-scan" type="button" class="btn btn-secondary">Escanear</button>
            <button id="btn-nuevo" type="button" class="btn btn-secondary">Nuevo</button>
          </div>
        </form>

        <section id="scanner-panel" class="scanner-panel" hidden aria-label="Escáner">
          <video id="scanner-video" class="scanner-video" playsinline muted></video>
          <p id="scanner-hint" class="scanner-hint" aria-live="polite">
            Apunta la cámara al código.
          </p>
        </section>

        <article id="result-card" class="result-card" hidden>
          <p><strong>Nº de socio (categoría):</strong> <span id="r-socio">-</span></p>
          <p><strong>Nombre y apellidos:</strong> <span id="r-nombre">-</span></p>
          <p><strong>Marcaje:</strong> <span id="r-marcaje">-</span></p>
          <p><strong>Estado:</strong> <span id="r-estado">-</span></p>
        </article>

        <p id="reader-status" class="status-text" aria-live="polite"></p>

        <button id="btn-salir" type="button" class="btn btn-danger">Salir</button>
      </section>

      <footer class="app-footer">
        <p>Realizado por Qanet - Redes y Componentes SL</p>
      </footer>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
