<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lector de Entradas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="app-header">
        <p class="kicker">Control de Acceso</p>
        <h1>Lector de Entradas</h1>
      </header>

      <section id="login-view" class="card view active" aria-label="Login">
        <h2>Login</h2>
        <form id="login-form" class="form-grid">
          <label>
            Usuario
            <input id="usuario" name="usuario" type="text" required autocomplete="username" />
          </label>

          <label>
            Contraseña
            <input
              id="contrasena"
              name="contrasena"
              type="password"
              required
              autocomplete="current-password"
            />
          </label>

          <label class="checkbox-row">
            <input id="mantenerSesion" name="mantenerSesion" type="checkbox" />
            Mantener sesión iniciada
          </label>

          <button type="submit" class="btn btn-primary">Iniciar sesión</button>
          <p id="login-status" class="status-text" aria-live="polite"></p>
        </form>
      </section>

      <section id="reader-view" class="card view" aria-label="Leer CCBB">
        <h2>Leer CCBB</h2>

        <form id="reader-form" class="form-grid compact">
          <label>
            Introducir CCBB
            <input id="ccbb" name="ccbb" type="text" placeholder="Ej: 123456" required />
          </label>

          <div class="actions-row">
            <button type="submit" class="btn btn-primary">Leer CCBB</button>
            <button id="btn-nuevo" type="button" class="btn btn-secondary">Nuevo</button>
          </div>
        </form>

        <article id="result-card" class="result-card" hidden>
          <p><strong>Nº de socio (categoría):</strong> <span id="r-socio">-</span></p>
          <p><strong>Nombre y apellidos:</strong> <span id="r-nombre">-</span></p>
          <p><strong>Marcaje:</strong> <span id="r-marcaje">-</span></p>
          <p><strong>Estado:</strong> <span id="r-estado">-</span></p>
        </article>

        <p id="reader-status" class="status-text" aria-live="polite"></p>

        <button id="btn-salir" type="button" class="btn btn-danger">Salir</button>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
